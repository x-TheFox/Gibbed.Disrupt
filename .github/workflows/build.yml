name: Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install .NET Framework 4.7.2 Targeting Pack
      run: |
        choco install netfx-4.7.2-devpack -y

    - name: Restore NuGet packages
      run: dotnet restore Disrupt.sln

    - name: Build solution (Release)
      run: dotnet build Disrupt.sln -c Release --no-restore

    - name: Publish built artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Gibbed.Disrupt-Release-${{ github.sha }}
        path: |
          projects/*/bin/Release/**/*.exe
          projects/*/bin/Release/**/*.dll
          bin/projects/**
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only run this job on pushes to main/master, not pull requests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: Gibbed.Disrupt-Release-${{ github.sha }}
        path: raw-artifacts

    - name: Create release package
      run: |
        mkdir -p staging/bin/projects
        # Copy all built executables and DLLs into bin/
        find raw-artifacts/projects -type f \( -name "*.exe" -o -name "*.dll" \) -exec cp {} staging/bin/ \;
        # Copy the projects folder (XML configs + file lists) alongside the binaries
        # This is required for the tools to resolve file names from hashes at runtime
        cp -r raw-artifacts/bin/projects/* staging/bin/projects/

        cd staging
        zip -r ../Gibbed.Disrupt-latest.zip .
        cd ..

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: Gibbed.Disrupt-latest.zip
        tag_name: v1.0.${{ github.run_number }}
        name: Release v1.0.${{ github.run_number }}
        body: |
          Automated release for commit ${{ github.sha }}.

          **Contents:**
          - `bin/` — All built executables and libraries
          - `bin/projects/` — Project configurations and file lists (required for hash name resolution)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
